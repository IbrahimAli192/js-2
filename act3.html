<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Number ;: 33</h1>
      <p id="demo"></p>
    <script>
        function checkEvenOdd(num) {
    if (num % 2 === 0) {
        return `${num} is even`;
    } else {
        return `${num} is odd`;
    }
}

// Test cases
console.log(checkEvenOdd(32)); // "32 is even"
console.log(checkEvenOdd(31)); // "31 is odd"
    </script>
</body>
</html>
